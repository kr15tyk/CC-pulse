name: Delete Webex Message (one-time)
on:
  workflow_dispatch:
    inputs:
      message_id:
        description: Webex message ID to delete
        required: true
jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Webex message
        run: |
          curl -s -X DELETE "https://webexapis.com/v1/messages/${{ github.event.inputs.message_id }}" -H "Authorization: Bearer ${{ secrets.CC_WEBEX_BOT_TOKEN }}" -w "%{http_code}"
